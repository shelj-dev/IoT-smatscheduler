{% extends 'includes/base.html' %}
{% block body %}
  <div class="space-y-8">
    <div class="flex items-center justify-between border-b border-white/10 pb-6">
      <a href="{% url 'dashboard' %}" class="group flex items-center gap-2 text-slate-400 transition-colors hover:text-white">
        <span class="text-xl transition-transform group-hover:-translate-x-1">&larr;</span>
        <span class="font-medium">Back to Dashboard</span>
      </a>
      <h1 class="text-2xl font-bold text-white">Device Control Panel</h1>
      <div class="w-32 text-right text-xs font-mono text-slate-500 uppercase tracking-widest">System v2.4</div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex items-center justify-between rounded-xl bg-slate-900/50 p-4 ring-1 ring-white/5">
        <span class="text-slate-400 font-medium text-sm">Sensor Data Status</span>
        <span id="sensor-data-status" class="rounded-full px-3 py-1 text-xs font-bold ring-1 ring-inset transition-all">Loading...</span>
      </div>
      <div class="flex items-center justify-between rounded-xl bg-slate-900/50 p-4 ring-1 ring-white/5">
        <span class="text-slate-400 font-medium text-sm">Manual Data Status</span>
        <span id="manual-data-status" class="rounded-full px-3 py-1 text-xs font-bold ring-1 ring-inset transition-all">Loading...</span>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="group relative overflow-hidden rounded-3xl bg-slate-900 p-8 shadow-xl ring-1 ring-white/10 transition-all hover:ring-yellow-500/50">
        <div class="flex items-center gap-4 mb-8">
          <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-yellow-500/10 text-yellow-500 text-2xl group-hover:animate-pulse">💡</div>
          <h2 class="text-xl font-bold text-white">Lighting System</h2>
        </div>

        <div class="flex gap-4">
          <button onclick="control('light','on')" class="flex-1 rounded-xl bg-yellow-500 py-4 font-bold text-black shadow-lg shadow-yellow-500/20 transition-all hover:scale-[1.02] active:scale-95">Turn ON</button>
          <button onclick="control('light','off')" class="flex-1 rounded-xl bg-slate-800 py-4 font-bold text-slate-300 ring-1 ring-white/10 transition-all hover:bg-slate-700 hover:text-white active:scale-95">Turn OFF</button>
        </div>
      </div>

      <div class="group relative overflow-hidden rounded-3xl bg-slate-900 p-8 shadow-xl ring-1 ring-white/10 transition-all hover:ring-blue-500/50">
        <div class="flex items-center gap-4 mb-8">
          <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-blue-500/10 text-blue-500 text-2xl">🌀</div>
          <h2 class="text-xl font-bold text-white">Ventilation Fan</h2>
        </div>

        <div class="flex gap-4">
          <button onclick="control('fan','on')" class="flex-1 rounded-xl bg-blue-600 py-4 font-bold text-white shadow-lg shadow-blue-500/20 transition-all hover:scale-[1.02] active:scale-95">Turn ON</button>
          <button onclick="control('fan','off')" class="flex-1 rounded-xl bg-slate-800 py-4 font-bold text-slate-300 ring-1 ring-white/10 transition-all hover:bg-slate-700 hover:text-white active:scale-95">Turn OFF</button>
        </div>
      </div>
    </div>

    <div id="status" class="fixed bottom-8 right-8 rounded-2xl border border-white/10 bg-slate-950/80 px-6 py-4 text-sm font-medium backdrop-blur-xl shadow-2xl transition-all">
      Status: <span class="text-slate-500">Waiting for input...</span>
    </div>
  </div>

  <script>
    // Updated fetchStatuses to handle the Tailwind classes
    async function fetchStatuses() {
      try {
        const sensorRes = await fetch('/api/sensor_data_api/')
        const sensorData = await sensorRes.json()
        const sSpan = document.getElementById('sensor-data-status')
    
        if (sensorData.data && sensorData.data.length > 0) {
          const isOn = sensorData.data[0].value == 1
          sSpan.innerHTML = isOn ? 'ACTIVE' : 'INACTIVE'
          sSpan.className = isOn ? 'rounded-full px-3 py-1 text-xs font-bold ring-1 ring-inset bg-emerald-500/10 text-emerald-400 ring-emerald-500/20' : 'rounded-full px-3 py-1 text-xs font-bold ring-1 ring-inset bg-rose-500/10 text-rose-400 ring-rose-500/20'
        }
    
        const manualRes = await fetch('/api/send_data/')
        const manualData = await manualRes.json()
        const mSpan = document.getElementById('manual-data-status')
    
        const isAuto = manualData.schedule_automode
        mSpan.innerHTML = isAuto ? 'AUTOMODE ON' : 'MANUAL'
        mSpan.className = isAuto ? 'rounded-full px-3 py-1 text-xs font-bold ring-1 ring-inset bg-blue-500/10 text-blue-400 ring-blue-500/20' : 'rounded-full px-3 py-1 text-xs font-bold ring-1 ring-inset bg-slate-500/10 text-slate-400 ring-slate-500/20'
      } catch (error) {
        console.log('Error fetching statuses:', error)
      }
    }
    
    // Rest of your control() function stays the same...
    // Just ensure you update the status color logic if needed!
    setInterval(fetchStatuses, 2000)
    fetchStatuses()
  </script>
{% endblock %}
