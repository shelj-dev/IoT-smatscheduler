<div class="flex h-screen w-64 flex-col bg-slate-900 text-slate-300">
  <div class="flex items-center gap-3 px-6 py-8 text-white font-bold text-xl">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
      <line x1="16" y1="2" x2="16" y2="6"></line>
      <line x1="8" y1="2" x2="8" y2="6"></line>
      <line x1="3" y1="10" x2="21" y2="10"></line>
    </svg>
    <span>Scheduler</span>
  </div>

  <nav class="flex-1 space-y-1 px-4">
    <a href="{% url 'dashboard' %}"
      class="flex items-center gap-3 rounded-lg px-4 py-3 transition-colors 
       {% if request.resolver_match.url_name == 'dashboard' %}
         bg-blue-600 text-white
      {% else %}
         hover:bg-slate-800 hover:text-white
      {% endif %}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      <span class="font-medium">Motion Control</span>
    </a>

    <a href="{% url 'manual' %}"
      class="flex items-center gap-3 rounded-lg px-4 py-3 transition-colors
       {% if request.resolver_match.url_name == 'manual' %}
         bg-blue-600 text-white
      {% else %}
         hover:bg-slate-800 hover:text-white
      {% endif %}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
      <span class="font-medium">Manual Data</span>
    </a>

    <a href="{% url 'control_page' %}"
      class="flex items-center gap-3 rounded-lg px-4 py-3 transition-colors
       {% if request.resolver_match.url_name == 'control_page' %}
         bg-blue-600 text-white
      {% else %}
         hover:bg-slate-800 hover:text-white
      {% endif %}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
      </svg>
      <span class="font-medium">Control Device</span>
    </a>
  </nav>

  <div class="p-4 border-t border-slate-800">
    <a href="/" class="flex items-center gap-3 rounded-lg px-4 py-3 text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-colors">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span class="font-medium">Logout</span>
    </a>
  </div>
</div>
